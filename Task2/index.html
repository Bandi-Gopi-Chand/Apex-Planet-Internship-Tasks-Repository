<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Auth Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">

            <a class="navbar-brand" href="#">Auth Portal</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="register.html">Register</a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

    <!-- Carousel -->

    <div id="carouselExample" class="carousel slide">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://picsum.photos/1200/500?1"
                    class="d-block w-100">
            </div>

            <div class="carousel-item">
                <img src="https://picsum.photos/1200/500?2"
                    class="d-block w-100">
            </div>

        </div>

        <button class="carousel-control-prev"
            data-bs-target="#carouselExample"
            data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>

        </button>

        <button class="carousel-control-next"
            data-bs-target="#carouselExample"
            data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>

        </button>

    </div>

    <!-- Cards -->

    <section class="container py-5">

        <div class="row g-4">

            <div class="col-md-4">

                <div class="card feature-card">

                    <div class="card-body text-center">

                        <i class="bi bi-shield-lock fs-1"></i>

                        <h4>Secure Login</h4>

                        <p>Protected authentication system.</p>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card feature-card">

                    <div class="card-body text-center">

                        <i class="bi bi-person-plus fs-1"></i>

                        <h4>Registration</h4>

                        <p>Fast and simple registration.</p>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card feature-card">

                    <div class="card-body text-center">

                        <i class="bi bi-phone fs-1"></i>

                        <h4>Responsive</h4>

                        <p>Works on all devices.</p>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer class="bg-dark text-white text-center p-3">

        © 2026 Auth Portal

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
